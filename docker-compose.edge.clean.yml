version: '3.8'

services:
  siot-edge-gw:
    image: siot-edge-gw:latest
    container_name: siot-edge-gw
    restart: unless-stopped
    privileged: ${SIOT_EDGE_PRIVILEGED:-false}
    env_file:
      - ${SIOT_EDGE_ENV_FILE:-config/env/domains/edge.env.example}
    volumes:
      - /dev:/dev
      - ./00_sistema_tesis/canon:/app/canon:ro
      - ./runtime/edge_iot/logs:/app/logs
    networks:
      - siot-iot-net
      - siot-inference-net
    healthcheck:
      test: ["CMD", "python3", "07_scripts/verify_edge_health.py"]
      interval: 60s
      timeout: 10s
      retries: 3
    command: ["python3", "runtime/edge_iot/main.py"]

  siot-llm-edge:
    image: siot-llm-edge:latest
    container_name: siot-llm-edge
    restart: unless-stopped
    privileged: true
    env_file:
      - ${SIOT_EDGE_ENV_FILE:-config/env/domains/edge.env.example}
    volumes:
      - /dev:/dev
      - ./runtime/models/edge:/models:ro
    networks:
      - siot-inference-net
    command: ["python3", "01_servicios/edge/siot-llm-edge/main.py"]

  siot-edge-sync:
    image: siot-edge-sync:latest
    container_name: siot-edge-sync
    restart: unless-stopped
    env_file:
      - ${SIOT_EDGE_ENV_FILE:-config/env/domains/edge.env.example}
    environment:
      - HUB_URL=${SIOT_HUB_URL:-http://pc-hub:8080}
      - SYNC_INTERVAL=300
    volumes:
      - ./00_sistema_tesis/canon:/app/canon
      - ./runtime/edge_sync/buffer:/app/buffer
    networks:
      - siot-iot-net
    depends_on:
      - siot-edge-gw
    command: ["python3", "runtime/edge_sync/sync_manager.py"]

networks:
  siot-iot-net:
    driver: bridge
    internal: true
  siot-inference-net:
    driver: bridge
    internal: true
