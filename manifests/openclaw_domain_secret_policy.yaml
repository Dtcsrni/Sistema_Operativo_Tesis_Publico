{
  "version": "1.0",
  "env_root": "/etc/tesis-os/domains",
  "domains": {
    "personal": {
      "network_mode": "offline",
      "allow_web_assisted": false,
      "allow_api_formal": false,
      "allow_publication": false,
      "requires_strict_redaction": true,
      "providers": {
        "local": [],
        "deterministic_local": []
      }
    },
    "profesional": {
      "network_mode": "hybrid_controlled",
      "allow_web_assisted": true,
      "allow_api_formal": true,
      "allow_publication": "parcial",
      "requires_strict_redaction": true,
      "providers": {
        "local": [],
        "deterministic_local": [],
        "rknn_llm_experimental": [],
        "llamacpp_local": [],
        "desktop_compute": [],
        "openrouter_remote": ["OPENROUTER_API_KEY"],
        "external_llm_router": ["OPENCLAW_EXTERNAL_ROUTER_BASE_URL", "OPENCLAW_EXTERNAL_ROUTER_API_KEY"],
        "groq_api": ["GROQ_API_KEY"],
        "openai_api": ["OPENAI_API_KEY"],
        "gemini_web_assisted": ["OPENCLAW_GEMINI_STUDENT_ENABLED"],
        "chatgpt_plus_web_assisted": ["OPENCLAW_CHATGPT_PLUS_ENABLED"]
      }
    },
    "academico": {
      "network_mode": "hybrid_controlled",
      "allow_web_assisted": true,
      "allow_api_formal": true,
      "allow_publication": "sanitizado",
      "requires_strict_redaction": true,
      "providers": {
        "local": [],
        "deterministic_local": [],
        "rknn_llm_experimental": [],
        "llamacpp_local": [],
        "desktop_compute": [],
        "openrouter_remote": ["OPENROUTER_API_KEY"],
        "external_llm_router": ["OPENCLAW_EXTERNAL_ROUTER_BASE_URL", "OPENCLAW_EXTERNAL_ROUTER_API_KEY"],
        "groq_api": ["GROQ_API_KEY"],
        "gemini_api": ["GEMINI_API_KEY"],
        "gemini_web_assisted": ["OPENCLAW_GEMINI_STUDENT_ENABLED"],
        "openai_api": ["OPENAI_API_KEY"],
        "chatgpt_plus_web_assisted": ["OPENCLAW_CHATGPT_PLUS_ENABLED"]
      }
    },
    "edge": {
      "network_mode": "offline",
      "allow_web_assisted": false,
      "allow_api_formal": false,
      "allow_publication": "tecnico_controlado",
      "requires_strict_redaction": true,
      "providers": {
        "local": [],
