      }
    },
    "administrativo": {
      "network_mode": "offline",
      "allow_web_assisted": false,
      "allow_api_formal": false,
      "allow_publication": false,
      "requires_strict_redaction": true,
      "providers": {
        "local": [],
        "deterministic_local": []
      }
    },
    "operativo": {
      "network_mode": "hybrid_controlled",
      "allow_web_assisted": true,
      "allow_api_formal": true,
      "allow_publication": "sanitizado",
      "requires_strict_redaction": true,
      "providers": {
        "local": [],
        "deterministic_local": [],
        "llamacpp_local": [],
        "desktop_compute": []
      }
    }
