# Poltica de Dominio: Operacin IoT (Edge)
# [LID]: log_sesiones_trabajo_registradas.md

domain:
  id: edge-iot
  name: "Dominio de Control de Actuadores y Sensores"
  security_level: CRITICO
  network:
    internet_access: false
    allowed_peers:
      - edge-inference
      - pc-hub-sync
    ports:
      - internal: 5000  # Worker API

capabilities:
  - gpio_access: true
  - i2c_access: true
  - uart_access: true

