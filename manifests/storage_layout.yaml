{
  "version": "1.0",
  "objetivo": "Topologia NVMe/eMMC/microSD para Orange Pi 5 Plus",
  "medios": {
    "nvme": {
      "rol": "rootfs_principal",
      "montajes": [
        "/",
        "/home",
        "/opt",
        "/srv",
        "/var"
      ],
      "contenido": [
        "runtime",
        "workspace_activo",
        "logs_operativos",
        "caches"
      ]
    },
    "emmc": {
      "rol": "almacenamiento_secundario_inteligente",
      "montajes": [
        "/mnt/emmc/archive",
        "/mnt/emmc/backups",
        "/mnt/emmc/corpus",
        "/mnt/emmc/datasets",
        "/mnt/emmc/exports",
        "/mnt/emmc/models",
        "/mnt/emmc/snapshots"
      ],
      "contenido": [
        "backups",
        "corpus",
        "datasets",
        "historico",
        "snapshots"
      ]
    },
    "microsd": {
      "rol": "bootstrap_y_rescate",
      "montajes": [
        "/boot",
        "medio_extraible_instalacion"
      ],
      "contenido": [
        "imagen_instalacion",
        "rescate",
        "recovery"
      ]
    }
  },
  "politicas": {
    "rootfs_en_nvme": true,
    "escrituras_pesadas_fuera_de_microsd": true,
    "datos_frios_preferentemente_en_emmc": true,
    "rollback_manual_documentado": true
  }
}
