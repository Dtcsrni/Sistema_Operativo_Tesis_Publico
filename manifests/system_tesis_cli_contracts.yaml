{
  "version": "1.0",
  "contract_id": "system_tesis_cli_contracts",
  "entrypoint": "07_scripts/tesis.py",
  "commands": [
    {
      "id": "status",
      "usage": "python 07_scripts/tesis.py status",
      "outputs": ["texto_humano", "bloque_activo", "siguiente_entregable", "riesgo_principal"]
    },
    {
      "id": "next",
      "usage": "python 07_scripts/tesis.py next",
      "outputs": ["texto_humano", "tareas_sugeridas", "riesgos_prioritarios"]
    },
    {
      "id": "doctor_check",
      "usage": "python 07_scripts/tesis.py doctor --check",
      "outputs": ["exit_code", "errores_operativos"]
    },
    {
      "id": "publish_build",
      "usage": "python 07_scripts/tesis.py publish --build",
      "outputs": ["bundle_publico", "manifest_publico", "estado"]
    },
    {
      "id": "publish_check",
      "usage": "python 07_scripts/tesis.py publish --check",
      "outputs": ["exit_code", "drift_publicacion", "errores_publicacion"]
    },
    {
      "id": "source_status_check",
      "usage": "python 07_scripts/tesis.py source status --check",
      "outputs": ["exit_code", "source_repo_failures", "source_local_failures"]
    },
    {
      "id": "sync",
      "usage": "python 07_scripts/tesis.py sync --message <msg> --step-id validación humana interna no pública",
      "outputs": ["commit_id", "branch", "protected_summary"]
    }
  ],
  "rules": {
    "stdout_humano_primero": true,
    "breaking_output_change_requires_contract_update": true,
    "protected_changes_require_step_id": true
  }
}
