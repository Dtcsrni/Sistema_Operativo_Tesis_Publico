{
  "version": "1.0",
  "strategy": "watchdog_hibrido",
  "states": [
    "healthy",
    "degraded_offline",
    "recovering",
    "quarantined"
  ],
  "defaults": {
    "recovery_mode": "degradar_y_seguir",
    "failure_window_sec": 900,
    "max_consecutive_failures": 3,
    "soft_failure_restart_threshold": 2,
    "backoff_sec": 30,
    "quarantine_sec": 1800,
    "heartbeat_stale_sec": 180
  },
  "runtime_paths": {
    "state_dir": "/var/lib/edge-iot",
    "runtime_dir": "/var/lib/edge-iot/runtime",
    "spool_dir": "/srv/tesis/intercambio/edge/spool",
    "log_dir": "/var/log/edge-iot"
  },
  "failure_classes": {
    "hard_failure": "service_inactive_or_failed_to_start",
    "soft_failure": "service_alive_but_healthcheck_or_external_dependency_failed"
  },
  "rules": {
    "http_interdomain": false,
    "restart_loops_blocked_by_quarantine": true,
    "quarantine_requires_explicit_clear_or_expiration": true
  }
}
