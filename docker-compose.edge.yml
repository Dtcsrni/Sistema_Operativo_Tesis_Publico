services:
  # Gateway IoT del edge: sensores, actuadores y telemetría local
  siot-edge-gw:
    build:
      context: .
      dockerfile: Dockerfile.edge.base
    image: siot-edge-gw:latest # Se debe buildear en el edge o vía buildx
    container_name: siot-edge-gw
    init: true
    restart: unless-stopped
    privileged: ${SIOT_EDGE_PRIVILEGED:-false}
    env_file:
      - ${SIOT_EDGE_ENV_FILE:-config/env/domains/edge.env.example}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_RAWIO
      - NET_ADMIN
    tmpfs:
      - /tmp
    volumes:
      - /dev:/dev # Acceso a dispositivos de hardware
      - ./00_sistema_tesis/canon:/app/canon:ro
      - ./runtime/edge_iot/logs:/app/logs
    environment:
      - NODE_ID=orange_pi_5_plus
      - HUB_URL=${SIOT_HUB_URL:-http://pc-hub:4000}
    networks:
      - siot-iot-net
      - siot-inference-net
    healthcheck:
      test: ["CMD", "python3", "07_scripts/verify_edge_health.py"]
      interval: 60s
      timeout: 10s
      retries: 3
    command: ["python3", "runtime/edge_iot/main.py"]

  # Inferencia local RKLLM en el edge
  siot-llm-edge:
    build:
      context: .
      dockerfile: Dockerfile.edge
    image: siot-llm-edge:latest
    container_name: siot-llm-edge
    profiles:
      - npu
    init: true
    restart: unless-stopped
    privileged: true # Requerido para /dev/rknpu y mmap
    env_file:
      - ${SIOT_EDGE_ENV_FILE:-config/env/domains/edge.env.example}
    environment:
      - MODEL_PATH=/models/tinyllama_rkllm.rkllm
    volumes:
      - /dev:/dev
      - ./runtime/models/edge:/models:ro
    networks:
      - siot-inference-net
    command: ["python3", "01_servicios/edge/siot-llm-edge/main.py"]

  # Sincronizador hacia el hub del PC
  siot-edge-sync:
    build:
      context: .
      dockerfile: Dockerfile.edge
    image: siot-edge-sync:latest
    container_name: siot-edge-sync
    init: true
    restart: unless-stopped
    env_file:
      - ${SIOT_EDGE_ENV_FILE:-config/env/domains/edge.env.example}
    environment:
      - HUB_URL=${SIOT_HUB_URL:-http://pc-hub:4000}
      - SYNC_INTERVAL=300
    volumes:
      - ./00_sistema_tesis/canon:/app/canon
      - ./runtime/edge_sync/buffer:/app/buffer
    networks:
      - siot-iot-net
    depends_on:
      siot-edge-gw:
        condition: service_healthy
    command: ["python3", "runtime/edge_sync/sync_manager.py"]
  
networks:
  siot-iot-net:
    driver: bridge
    internal: true # Sin acceso a internet por default
  siot-inference-net:
    driver: bridge
    internal: true # Aislado de IoT y Sync excepto vía gateways controlados
