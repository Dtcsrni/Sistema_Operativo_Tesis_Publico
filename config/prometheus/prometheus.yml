global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus_local
    static_configs:
      - targets:
          - 127.0.0.1:9090
        labels:
          dominio: administrativo
          componente: prometheus

  - job_name: node_exporter_local
    static_configs:
      - targets:
          - 127.0.0.1:9100
        labels:
          dominio: host
          componente: node_exporter
