name: deploy-public-site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  upstream-disabled:
    if: github.repository != 'Dtcsrni/Sistema_Operativo_Tesis_Publico'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm upstream publication is disabled
        run: echo "GitHub Pages solo se despliega desde Dtcsrni/Sistema_Operativo_Tesis_Publico."

  deploy:
    if: github.repository == 'Dtcsrni/Sistema_Operativo_Tesis_Publico' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate public projection before deploy
        run: |
          python 07_scripts/sync_public_repo.py --mode mirror --target-dir "$RUNNER_TEMP/public-sync-check" --branch main --check --allow-dirty

      - name: Build public site
        run: mkdocs build

      - name: Deploy public site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force
