name: desplegar-sitio-publico

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publicacion-desactivada-en-origen:
    if: github.repository != 'Dtcsrni/Sistema_Operativo_Tesis_Publico'
    runs-on: ubuntu-latest
    steps:
      - name: Confirmar que la publicación en origen está desactivada
        run: echo "GitHub Pages solo se despliega desde Dtcsrni/Sistema_Operativo_Tesis_Publico."

  build-public-site:
    if: github.repository == 'Dtcsrni/Sistema_Operativo_Tesis_Publico' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validar proyección pública antes del despliegue
        run: |
          python 07_scripts/sync_public_repo.py --mode mirror --target-dir "$RUNNER_TEMP/public-sync-check" --branch main --skip-local-mirror --check --allow-dirty

      - name: Verificar artefacto público de entrada
        run: |
          test -f 06_dashboard/publico/index.html
          test -f 06_dashboard/publico/dashboard/index.html
          test -f 06_dashboard/publico/dashboard/icon.svg
          test -f 06_dashboard/publico/dashboard/manifest.webmanifest

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto estático de la superficie pública
        uses: actions/upload-pages-artifact@v3
        with:
          path: 06_dashboard/publico

  deploy:
    if: github.repository == 'Dtcsrni/Sistema_Operativo_Tesis_Publico' && github.ref == 'refs/heads/main'
    needs: build-public-site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar sitio público
        id: deployment
        uses: actions/deploy-pages@v4
