name: verify

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run governance gate
        run: python 07_scripts/governance_gate.py --stage ci --agent github-actions

      - name: Upload governance attestation and generated docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-gate-artifacts
          path: |
            00_sistema_tesis/bitacora/audit_history/governance_gate
            README.md
            06_dashboard/wiki
            06_dashboard/generado
