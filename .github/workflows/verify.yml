name: verificar

on:
  push:
  pull_request:

jobs:
  probar-y-construir:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Instalar dependencias de prueba
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Instalar shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Ejecutar shellcheck sobre bootstrap y operación
        run: |
          find bootstrap ops runtime/openclaw tests/smoke tests/integration benchmarks/scripts -type f -name "*.sh" -print0 | xargs -0 -r shellcheck

      - name: Validar proyección pública derivada
        run: |
          python 07_scripts/sync_public_repo.py --mode mirror --target-dir "$RUNNER_TEMP/public-sync-check" --branch main --skip-local-mirror --check

      - name: Ejecutar pruebas de humo del downstream público
        if: github.repository == 'Dtcsrni/Sistema_Operativo_Tesis_Publico'
        run: |
          python -m pytest -q tests/test_sync_public_repo.py

      - name: Ejecutar compuerta de gobernanza
        if: github.repository != 'Dtcsrni/Sistema_Operativo_Tesis_Publico'
        env:
          SISTEMA_TESIS_SKIP_GPG_CHECK: "1"
          SISTEMA_TESIS_STEP_ID: "validación humana interna no pública"
        run: python 07_scripts/governance_gate.py --stage ci --agent github-actions --step-id "validación humana interna no pública"

      - name: Regenerar wiki tras pasar compuertas
        if: github.repository != 'Dtcsrni/Sistema_Operativo_Tesis_Publico' && success()
        run: python 07_scripts/build_wiki.py

      - name: Regenerar tablero tras pasar compuertas
        if: github.repository != 'Dtcsrni/Sistema_Operativo_Tesis_Publico' && success()
        run: python 07_scripts/build_dashboard.py

      - name: Regenerar paquete público tras pasar compuertas
        if: github.repository != 'Dtcsrni/Sistema_Operativo_Tesis_Publico' && success()
        run: python 07_scripts/tesis.py publish --build

      - name: Validar enlaces derivados y públicos
        if: github.repository != 'Dtcsrni/Sistema_Operativo_Tesis_Publico' && success()
        run: python 07_scripts/validate_links.py

      - name: Validar calidad editorial pública
        if: github.repository != 'Dtcsrni/Sistema_Operativo_Tesis_Publico' && success()
        run: python 07_scripts/validate_public_text.py

      - name: Confirmar cambios de wiki si pasan las compuertas
        if: github.repository != 'Dtcsrni/Sistema_Operativo_Tesis_Publico' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 06_dashboard/wiki 06_dashboard/generado 06_dashboard/publico
          if git diff --cached --quiet; then
            echo "No hay cambios de wiki para confirmar."
          else
            git commit -m "citogates [validación humana interna no pública]: regenerar wiki y tablero tras verificación exitosa"
            git push origin HEAD:${GITHUB_REF#refs/heads/} || true
          fi

      - name: Subir atestación de gobernanza y documentos generados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artefactos-compuerta-gobernanza
          path: |
            historial interno no público/governance_gate
            README.md
            06_dashboard/wiki
            06_dashboard/generado
