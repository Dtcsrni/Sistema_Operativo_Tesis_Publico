name: verify

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Shellcheck bootstrap and ops scripts
        run: |
          find bootstrap ops runtime/openclaw tests/smoke tests/integration benchmarks/scripts -type f -name "*.sh" -print0 | xargs -0 -r shellcheck

      - name: Validate downstream public projection
        run: |
          python 07_scripts/sync_public_repo.py --mode mirror --target-dir "$RUNNER_TEMP/public-sync-check" --branch main --check

      - name: Run public downstream smoke checks
        if: github.repository == 'Dtcsrni/Sistema_Operativo_Tesis_Publico'
        run: |
          python -m pytest -q tests/test_sync_public_repo.py

      - name: Run governance gate
        if: github.repository != 'Dtcsrni/Sistema_Operativo_Tesis_Publico'
        env:
          SISTEMA_TESIS_SKIP_GPG_CHECK: "1"
          SISTEMA_TESIS_STEP_ID: "[validacion_humana_interna]"
        run: python 07_scripts/governance_gate.py --stage ci --agent github-actions --step-id "[validacion_humana_interna]"

      - name: Upload governance attestation and generated docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-gate-artifacts
          path: |
            [historial_interno_redactado]/governance_gate
            README.md
            06_dashboard/wiki
            06_dashboard/generado
